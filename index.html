function vMacroOverview(irD, ccD) {
  // After the HTML is in the DOM, make both column wrappers transparent to the
  // parent grid (display:contents) so their children become direct grid items,
  // then explicitly assign grid-column + grid-row so each section pair shares
  // the same grid row. DOM parent-child stays intact, so all .macro-col CSS
  // selectors (kpi-row sizing, .vh hiding, etc.) keep working.
  window.__postRender = function() {
    const ir = document.getElementById('macro-ir');
    const cc = document.getElementById('macro-cc');
    if (!ir || !cc) return;

    ir.style.display = 'contents';
    cc.style.display = 'contents';

    const place = (container, col) => {
      const secs = [...container.children].filter(el => !el.classList.contains('vh'));
      secs.forEach((el, i) => {
        el.style.gridColumn = col;
        el.style.gridRow    = (i + 1).toString();
        el.style.marginBottom = '0';
      });
    };
    place(ir, '1');
    place(cc, '2');
  };

  const irHtml = irD ? vInflationRate(irD) : '<div style="color:var(--muted);padding:20px">No inflation data.</div>';
  const ccHtml = ccD ? vConsumerConfidence(ccD) : '<div style="color:var(--muted);padding:20px">No CCI data.</div>';
  const updated = irD?.updated || ccD?.updated || '—';

  const briefText = (irD?.ai || '').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
  const actions   = irD?.aiActions || [];
  const actionHtml = actions.length ? `<ol style="margin:10px 0 0 0;padding-left:18px;line-height:1.8">
    ${actions.map(a => `<li style="font-size:11.5px;color:#333;margin-bottom:4px">${a.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')}</li>`).join('')}
  </ol>` : '';

  const combinedSummary = briefText ? `<div class="ai-box" style="margin-bottom:14px">
    <div class="ai-lbl">AI Summary — Inflation Rate + Consumer Confidence</div>
    <div class="ai-text" style="margin-bottom:6px">${briefText}</div>
    ${actionHtml ? `<div style="font-size:11px;font-weight:700;color:#5a7040;margin-top:10px;margin-bottom:2px">Action Items</div>${actionHtml}` : ''}
  </div>` : '';

  return `<div class="vh">
      <div class="vh-top">
        <div class="vh-title">Macro Indicators</div>
        <div class="vh-badges">${H.badge('gray','Updated '+updated)}</div>
      </div>
      <div class="vh-desc">Indonesia macroeconomic context — inflation rate (CPI) and consumer confidence index (CCI) side by side.</div>
    </div>
    ${combinedSummary}
    <style>
      .macro-col .vh { display:none !important; }
      .macro-col .kpi-row { grid-template-columns:repeat(2,1fr) !important; }
      .macro-col .blk:last-child { display:none !important; }
      @media(max-width:820px){ #macro-grid { grid-template-columns:1fr !important; } }
    </style>
    <div id="macro-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:12px 20px">
      <div id="macro-ir" class="macro-col">${irHtml}</div>
      <div id="macro-cc" class="macro-col">${ccHtml}</div>
    </div>`;
}

function vConsumerConfidence(d) {
  const allHistory = d.history || [];
  window.__ccHistory = allHistory;

  // Hover handlers (global so SVG onmousemove can call them)
  window.ccHover = function(evt) {
    const svg = document.getElementById('cc-svg');
    const tip = document.getElementById('cc-tip');
    const cross = document.getElementById('cc-cross');
    const hdot = document.getElementById('cc-hdot');
    if (!svg || !tip) return;
    const rect = svg.getBoundingClientRect();
    const mx = (evt.clientX - rect.left) * (560 / rect.width);
    const data = window.__ccPts || [];
    if (!data.length) return;
    let near = data[0];
    data.forEach(d => { if (Math.abs(d.x - mx) < Math.abs(near.x - mx)) near = d; });
    if (cross) { cross.setAttribute('x1', near.x); cross.setAttribute('x2', near.x); cross.setAttribute('opacity','0.5'); }
    const wrap = document.getElementById('cc-wrap');
    const wr = wrap ? wrap.getBoundingClientRect() : rect;
    let lft = evt.clientX - wr.left + 14;
    let top = evt.clientY - wr.top - 58;
    if (lft + 110 > wr.width) lft -= 130;
    tip.style.cssText = `display:block;position:absolute;left:${lft}px;top:${top}px;background:white;border:1.5px solid var(--g3);border-radius:8px;padding:6px 10px;box-shadow:0 2px 10px rgba(0,0,0,.1);pointer-events:none;z-index:99`;
    tip.innerHTML = `<div style="font-size:10px;color:var(--muted);font-weight:600">${near.month}</div><div style="font-size:15px;font-weight:800;color:${near.cci>=100?'var(--olive)':'var(--red)'}">CCI ${near.cci}</div><div style="font-size:9px;color:var(--muted);margin-top:1px">${near.cci>=120?'Highly Optimistic':near.cci>=111?'Optimistic':near.cci>=100?'Slightly Optimistic':'Pessimistic'}</div>`;
  };
  window.ccHoverOut = function() {
    const tip = document.getElementById('cc-tip');
    const cross = document.getElementById('cc-cross');
    if (tip)   tip.style.display = 'none';
    if (cross) cross.setAttribute('opacity','0');
  };

  function renderCCPeriod(period) {
    let filtered = allHistory;
    if      (period === '6mo') filtered = allHistory.slice(-6);
    else if (period === '1y')  filtered = allHistory.slice(-12);
    else if (period === '3y')  filtered = allHistory.slice(-36);
    else if (period === '5y')  filtered = allHistory.slice(-60);
    const chronological = filtered.slice();        // oldest → newest for chart
    let history = filtered.slice().reverse();      // newest → oldest for table

    const cciVals  = chronological.map(h => Number(h.cci)).filter(Boolean);
    const avgCCI   = cciVals.length ? (cciVals.reduce((a,b)=>a+b,0)/cciVals.length).toFixed(1) : '—';
    const maxCCI   = cciVals.length ? Math.max(...cciVals).toFixed(1) : '—';
    const minCCI   = cciVals.length ? Math.min(...cciVals).toFixed(1) : '—';
    const latestCCI= cciVals.length ? cciVals[cciVals.length-1].toFixed(1) : '—';

    // SVG bar chart
    const W=560, CH=120, PAD_L=36, PAD_R=14, PAD_T=12, PAD_B=28;
    const innerW = W - PAD_L - PAD_R;
    const innerH = CH - PAD_T - PAD_B;
    const yMin = Math.max(0, Math.min(...cciVals, 100) - 5);
    const yMax = Math.max(...cciVals, 130) + 3;
    const n = chronological.length || 1;
    const barSlot = innerW / n;
    const barW = Math.max(3, barSlot * 0.72);
    const xS = i => PAD_L + (i + 0.5) * barSlot;
    const yS = v => PAD_T + (1 - (v-yMin)/(yMax-yMin)) * innerH;
    const y100 = yS(100);

    // Store point data globally for hover
    window.__ccPts = chronological.map((h,i) => ({ x: parseFloat(xS(i).toFixed(1)), y: parseFloat(yS(Number(h.cci)).toFixed(1)), cci: Number(h.cci), month: h.month }));

    const bars = chronological.map((h,i) => {
      const cx = xS(i), v = Number(h.cci);
      const barTop = yS(v), barH = Math.max(1, (PAD_T + innerH) - barTop);
      const col = v >= 120 ? '#5C7A3E' : v >= 100 ? '#C9A84C' : '#C0392B';
      return `<rect x="${(cx - barW/2).toFixed(1)}" y="${barTop.toFixed(1)}" width="${barW.toFixed(1)}" height="${barH.toFixed(1)}" fill="${col}" opacity="0.85" rx="1.5" style="pointer-events:none"/>`;
    }).join('');

    const labelStep = n <= 12 ? 1 : n <= 24 ? 2 : n <= 36 ? 3 : 6;
    const xLabels = chronological.map((h,i) => {
      if (i % labelStep !== 0 && i !== n - 1) return '';
      return `<text x="${xS(i).toFixed(1)}" y="${CH-6}" text-anchor="middle" font-size="6" fill="#888" style="pointer-events:none">${h.month}</text>`;
    }).join('');

    const yTicks = [Math.round(yMin), 100, Math.round(yMax)].map(v => {
      const y=yS(v).toFixed(1);
      return `<text x="${PAD_L-4}" y="${parseFloat(y)+3}" text-anchor="end" font-size="8" fill="#aaa" style="pointer-events:none">${v}</text>
        <line x1="${PAD_L}" y1="${y}" x2="${W-PAD_R}" y2="${y}" stroke="#eee" stroke-width="1" style="pointer-events:none"/>`;
    }).join('');

    const svgChart = cciVals.length
      ? `<div id="cc-wrap" style="position:relative">
          <div id="cc-tip" style="display:none"></div>
          <svg id="cc-svg" viewBox="0 0 ${W} ${CH}" xmlns="http://www.w3.org/2000/svg" style="width:100%;display:block;overflow:visible;cursor:crosshair"
            onmousemove="ccHover(event)" onmouseleave="ccHoverOut()">
            ${yTicks}
            <line x1="${PAD_L}" y1="${y100.toFixed(1)}" x2="${W-PAD_R}" y2="${y100.toFixed(1)}" stroke="#C0392B" stroke-width="1" stroke-dasharray="5,3" opacity="0.35" style="pointer-events:none"/>
            <text x="${W-PAD_R+2}" y="${(y100+3).toFixed(1)}" font-size="7" fill="#C0392B" opacity="0.6" style="pointer-events:none">100</text>
            ${bars}
            ${xLabels}
            <line id="cc-cross" x1="0" y1="${PAD_T}" x2="0" y2="${PAD_T+innerH}" stroke="#999" stroke-width="1" stroke-dasharray="3,2" opacity="0" style="pointer-events:none"/>
            <rect x="${PAD_L}" y="${PAD_T}" width="${innerW}" height="${innerH}" fill="transparent"/>
          </svg>
        </div>
        <div style="display:flex;justify-content:space-between;margin-top:4px;font-size:10px;color:var(--muted)">
          <span>Optimistic threshold: <strong style="color:var(--text)">100</strong> · Source: Bank Indonesia via Trading Economics</span>
          <span>
            <span style="display:inline-block;width:8px;height:8px;background:#5C7A3E;border-radius:2px;margin-right:3px;vertical-align:middle"></span>Highly Optimistic (≥120)
            <span style="display:inline-block;width:8px;height:8px;background:#C9A84C;border-radius:2px;margin:0 3px 0 8px;vertical-align:middle"></span>Optimistic
            <span style="display:inline-block;width:8px;height:8px;background:var(--red);border-radius:2px;margin:0 3px 0 8px;vertical-align:middle"></span>Pessimistic
          </span>
        </div>`
      : `<div style="color:var(--muted);font-size:12px;padding:12px 0">No historical data yet.</div>`;

    // Compact inline stat strip instead of tall kpi cards
    const statsHtml = `<div style="display:flex;gap:8px;margin-bottom:10px">
      <div style="flex:1;padding:8px 10px;background:var(--g1);border-radius:8px;border:1px solid var(--g2)">
        <div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted)">Average</div>
        <div style="font-size:18px;font-weight:800;color:var(--text);line-height:1.2">${avgCCI}</div>
        <div style="font-size:9px;color:var(--muted)">${cciVals.length} month${cciVals.length!==1?'s':''}</div>
      </div>
      <div style="flex:1;padding:8px 10px;background:var(--g1);border-radius:8px;border:1px solid var(--g2)">
        <div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted)">Highest</div>
        <div style="font-size:18px;font-weight:800;color:var(--green);line-height:1.2">${maxCCI}</div>
      </div>
      <div style="flex:1;padding:8px 10px;background:var(--g1);border-radius:8px;border:1px solid var(--g2)">
        <div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted)">Lowest</div>
        <div style="font-size:18px;font-weight:800;color:var(--red);line-height:1.2">${minCCI}</div>
      </div>
      <div style="flex:1;padding:8px 10px;background:var(--g1);border-radius:8px;border:1px solid var(--g2)">
        <div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted)">Latest</div>
        <div style="font-size:18px;font-weight:800;color:var(--text);line-height:1.2">${latestCCI}</div>
        <div style="font-size:9px;color:${Number(latestCCI)>=100?'var(--green)':'var(--red)'}">${Number(latestCCI)>=100?'✓ Optimistic':'⚠ Pessimistic'}</div>
      </div>
    </div>`;

    const tableRows = history.map(h => {
      const v=Number(h.cci); const isLast=h===history[0];
      return [
        isLast?`<strong>${h.month}</strong>`:h.month,
        `<span class="fw ${v>=100?'tup':'tdn'}">${v}</span>`,
        v>=100?'<span class="st st-g">✓ Optimistic</span>':'<span class="st st-r">⚠ Pessimistic</span>',
        h.beauty||'—',
      ];
    });
    tableRows.push([
      '<span style="font-weight:700;color:var(--muted)">Average</span>',
      `<span class="fw">${avgCCI}</span>`,'','',
    ]);

    return { statsHtml, svgChart, tableHtml: H.table(['Month','CCI','Status','Beauty Spend YoY'], tableRows) };
  }

  window.setCCPeriod = (period) => {
    const el = document.getElementById('cc-area');
    if (!el) return;
    const { statsHtml, svgChart, tableHtml } = renderCCPeriod(period);
    el.querySelector('#cc-stats').innerHTML = statsHtml;
    el.querySelector('#cc-chart').innerHTML = svgChart;
    el.querySelector('#cc-table').innerHTML = tableHtml;
    el.querySelectorAll('.cc-btn').forEach(b => {
      const active = b.dataset.p === period;
      b.style.background = active ? 'var(--olive)' : 'transparent';
      b.style.color = active ? 'white' : 'var(--olive-dk)';
    });
  };

  const init = renderCCPeriod('6mo');
  const periods = [['6mo','6MO'],['1y','1Y'],['3y','3Y'],['5y','5Y'],['all','All']];
  const btnRow = periods.map(([p,lbl]) =>
    `<button class="cc-btn" data-p="${p}" onclick="setCCPeriod('${p}')"
      style="padding:3px 12px;border-radius:99px;border:1.5px solid var(--olive);cursor:pointer;
      font-family:inherit;font-size:11px;font-weight:700;letter-spacing:.4px;transition:all .15s;
      background:${p==='6mo'?'var(--olive)':'transparent'};color:${p==='6mo'?'white':'var(--olive-dk)'}">${lbl}</button>`
  ).join('');

  const chartBlock = `<div id="cc-area">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <span style="font-size:10px;color:var(--muted)">Hover over the chart to inspect each month</span>
      <div style="display:flex;gap:5px">${btnRow}</div>
    </div>
    <div id="cc-stats">${init.statsHtml}</div>
    <div id="cc-chart" style="margin-top:6px">${init.svgChart}</div>
    <div id="cc-table" style="margin-top:10px">${init.tableHtml}</div>
  </div>`;

  // CCI index scale reference
  const cciScale = `
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:4px">
      ${[
        ['< 80',    'Severely Pessimistic', 'var(--red)',    'var(--red-lt)'],
        ['80–99',   'Pessimistic',          '#c47d0e',       'var(--amber-lt)'],
        ['100–110', 'Slightly Optimistic',  'var(--olive)',  'var(--olive-lt)'],
        ['111–120', 'Optimistic',           'var(--olive)',  'var(--olive-lt)'],
        ['> 120',   'Highly Optimistic',    'var(--green)',  'var(--green-lt)'],
      ].map(([range, label, color, bg]) =>
        `<div style="flex:1;min-width:90px;padding:8px 10px;border-radius:8px;background:${bg};border:1px solid ${color}22">
          <div style="font-size:13px;font-weight:800;color:${color}">${range}</div>
          <div style="font-size:12px;color:var(--text);margin-top:2px">${label}</div>
        </div>`
      ).join('')}
    </div>
    <div style="font-size:10px;color:var(--muted);margin-top:6px">Scale: 0–200 · Neutral threshold: <strong style="color:var(--text)">100</strong> · Source: Bank Indonesia</div>`;

  // Compute 6M average CCI from history for the 4th KPI card
  const last6cci  = allHistory.slice(-6).map(h => Number(h.cci)).filter(v => !isNaN(v));
  const avg6cci   = last6cci.length ? (last6cci.reduce((a,b)=>a+b,0)/last6cci.length).toFixed(1) : '—';
  const currCci   = Number(d.kpis?.[0]?.val);
  const cciDiff   = avg6cci !== '—' && !isNaN(currCci) ? (currCci - Number(avg6cci)).toFixed(1) : null;
  const avg6Trend = cciDiff === null ? 'st' : Number(cciDiff) > 0 ? 'up' : Number(cciDiff) < 0 ? 'dn' : 'st';
  const avg6T     = cciDiff === null ? '→ 6-Month Rolling'
                  : Number(cciDiff) > 0 ? `↑ +${cciDiff} vs 6M avg` : `↓ ${cciDiff} vs 6M avg`;

  // KPI row with fully English labels (override DB labels for sub-indices)
  const kpiCards = [
    { lbl: 'Current CCI',                  val: d.kpis?.[0]?.val ?? '—', u: '', trend: d.kpis?.[0]?.trend, t: d.kpis?.[0]?.t },
    { lbl: 'Current Conditions Index',     val: d.kpis?.[1]?.val ?? '—', u: '', trend: d.kpis?.[1]?.trend, t: d.kpis?.[1]?.t },
    { lbl: 'Consumer Expectations Index',  val: d.kpis?.[2]?.val ?? '—', u: '', trend: d.kpis?.[2]?.trend, t: d.kpis?.[2]?.t },
    { lbl: '6M Average CCI',              val: avg6cci,                   u: '', trend: avg6Trend,          t: avg6T },
  ];

  return H.vh('Consumer Confidence — CCI', d.desc, d.updated, d.alertBadge)
    + H.kpiRow(kpiCards)
    + H.blk('CCI Index Scale', cciScale)
    + H.blk('CCI Trend — Live Data from Bank Indonesia', chartBlock)
    + H.blk('AI Insight', `<div class="ai-box"><div class="ai-lbl">AI Summary — Auto-generated</div><div class="ai-text">${d.ai}</div></div>`);
}

function vInflationRate(d) {
  const allHistory = d.history || [];
  window.__irHistory = allHistory;

  window.irHover = function(evt) {
    const svg = document.getElementById('ir-svg');
    const tip = document.getElementById('ir-tip');
    const cross = document.getElementById('ir-cross');
    const hdot = document.getElementById('ir-hdot');
    if (!svg || !tip) return;
    const rect = svg.getBoundingClientRect();
    const mx = (evt.clientX - rect.left) * (560 / rect.width);
    const data = window.__irPts || [];
    if (!data.length) return;
    let near = data[0];
    data.forEach(p => { if (Math.abs(p.x - mx) < Math.abs(near.x - mx)) near = p; });
    if (cross) { cross.setAttribute('x1', near.x); cross.setAttribute('x2', near.x); cross.setAttribute('opacity','0.5'); }
    if (hdot)  { hdot.setAttribute('cx', near.x); hdot.setAttribute('cy', near.y); hdot.setAttribute('opacity','1'); }
    const wrap = document.getElementById('ir-wrap');
    const wr = wrap ? wrap.getBoundingClientRect() : rect;
    let lft = evt.clientX - wr.left + 14;
    let top = evt.clientY - wr.top - 58;
    if (lft + 120 > wr.width) lft -= 140;
    const col = near.rate <= 3.5 ? 'var(--olive)' : near.rate <= 5 ? 'var(--amber)' : 'var(--red)';
    const st  = near.rate <= 1.5 ? 'Below Target' : near.rate <= 3.5 ? 'Within BI Target' : near.rate <= 5 ? 'Above Target' : 'High Inflation';
    tip.style.cssText = `display:block;position:absolute;left:${lft}px;top:${top}px;background:white;border:1.5px solid var(--g3);border-radius:8px;padding:6px 10px;box-shadow:0 2px 10px rgba(0,0,0,.1);pointer-events:none;z-index:99`;
    tip.innerHTML = `<div style="font-size:10px;color:var(--muted);font-weight:600">${near.month}</div><div style="font-size:15px;font-weight:800;color:${col}">${near.rate}%</div><div style="font-size:9px;color:var(--muted);margin-top:1px">${st}</div>`;
  };
  window.irHoverOut = function() {
    const tip = document.getElementById('ir-tip');
    const cross = document.getElementById('ir-cross');
    const hdot = document.getElementById('ir-hdot');
    if (tip)   tip.style.display = 'none';
    if (cross) cross.setAttribute('opacity','0');
    if (hdot)  hdot.setAttribute('opacity','0');
  };

  const PAGE_SIZE = 12;

  function renderIRPeriod(period, page) {
    page = page || 1;
    let filtered = allHistory;
    if      (period === '6mo') filtered = allHistory.slice(-6);
    else if (period === '1y')  filtered = allHistory.slice(-12);
    else if (period === '3y')  filtered = allHistory.slice(-36);
    else if (period === '5y')  filtered = allHistory.slice(-60);
    // 'max' = all
    let history = filtered.slice().reverse(); // latest first for table
    const chronological = filtered; // oldest→newest for chart

    const rates    = chronological.map(h => Number(h.rate)).filter(v => !isNaN(v));
    const avgRate  = rates.length ? (rates.reduce((a,b)=>a+b,0)/rates.length).toFixed(2) : '—';
    const maxRate  = rates.length ? Math.max(...rates).toFixed(2) : '—';
    const minRate  = rates.length ? Math.min(...rates).toFixed(2) : '—';
    const latestRate = rates.length ? rates[rates.length-1].toFixed(2) : '—';

    const W=560, CH=110, PAD_L=36, PAD_R=14, PAD_T=12, PAD_B=24;
    const innerW = W - PAD_L - PAD_R;
    const innerH = CH - PAD_T - PAD_B;
    const yMin = Math.max(0, Math.min(...rates, 1.0) - 0.3);
    const yMax = Math.max(...rates, 4.0) + 0.3;
    const xS = i => PAD_L + (rates.length > 1 ? (i/(rates.length-1))*innerW : innerW/2);
    const yS = v => PAD_T + (1 - (v-yMin)/(yMax-yMin)) * innerH;
    const y35 = yS(3.5);  // BI upper target threshold
    const y15 = yS(1.5);  // BI lower target threshold

    window.__irPts = chronological.map((h,i) => ({
      x: parseFloat(xS(i).toFixed(1)),
      y: parseFloat(yS(Number(h.rate)).toFixed(1)),
      rate: Number(h.rate),
      month: h.month,
    }));

    const pts = chronological.map((h,i) => `${xS(i).toFixed(1)},${yS(Number(h.rate)).toFixed(1)}`).join(' ');
    const fillPts = chronological.length > 1
      ? `${xS(0).toFixed(1)},${(PAD_T+innerH).toFixed(1)} ${pts} ${xS(chronological.length-1).toFixed(1)},${(PAD_T+innerH).toFixed(1)}`
      : '';

    const dotColor = r => r <= 3.5 ? '#7A8B5E' : r <= 5 ? '#C47D0E' : '#C0392B';

    const xLabels = chronological.map((h,i) => {
      if (i % labelStep !== 0 && i !== chronological.length - 1) return '';
      const lbl = rates.length > 36 ? `'${h.year % 100}` : h.month.replace(' 20','\'');
      return `<text x="${xS(i).toFixed(1)}" y="${CH-4}" text-anchor="middle" font-size="6" fill="#888" style="pointer-events:none">${lbl}</text>`;
    }).join('');

    const yTicks = [Math.round(yMin*10)/10, 1.5, 3.5, Math.round(yMax*10)/10].filter((v,i,a)=>a.indexOf(v)===i).map(v => {
      const y=yS(v).toFixed(1);
      return `<text x="${PAD_L-4}" y="${parseFloat(y)+3}" text-anchor="end" font-size="8" fill="#aaa" style="pointer-events:none">${v}</text>
        <line x1="${PAD_L}" y1="${y}" x2="${W-PAD_R}" y2="${y}" stroke="#eee" stroke-width="1" style="pointer-events:none"/>`;
    }).join('');

    const svgChart = rates.length
      ? `<div id="ir-wrap" style="position:relative">
          <div id="ir-tip" style="display:none"></div>
          <svg id="ir-svg" viewBox="0 0 ${W} ${CH}" xmlns="http://www.w3.org/2000/svg" style="width:100%;display:block;overflow:visible;cursor:crosshair"
            onmousemove="irHover(event)" onmouseleave="irHoverOut()">
            <defs>
              <linearGradient id="irGrad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#7A8B5E" stop-opacity="0.15"/>
                <stop offset="100%" stop-color="#7A8B5E" stop-opacity="0.01"/>
              </linearGradient>
            </defs>
            ${yTicks}
            <line x1="${PAD_L}" y1="${y35.toFixed(1)}" x2="${W-PAD_R}" y2="${y35.toFixed(1)}" stroke="#C0392B" stroke-width="1" stroke-dasharray="5,3" opacity="0.4" style="pointer-events:none"/>
            <text x="${W-PAD_R+2}" y="${(y35+3).toFixed(1)}" font-size="7.5" fill="#C0392B" opacity="0.6" style="pointer-events:none">3.5%</text>
            <line x1="${PAD_L}" y1="${y15.toFixed(1)}" x2="${W-PAD_R}" y2="${y15.toFixed(1)}" stroke="#7A8B5E" stroke-width="1" stroke-dasharray="3,2" opacity="0.3" style="pointer-events:none"/>
            <text x="${W-PAD_R+2}" y="${(y15+3).toFixed(1)}" font-size="7.5" fill="#7A8B5E" opacity="0.5" style="pointer-events:none">1.5%</text>
            ${fillPts ? `<polygon points="${fillPts}" fill="url(#irGrad)" style="pointer-events:none"/>` : ''}
            <polyline points="${pts}" fill="none" stroke="#7A8B5E" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" style="pointer-events:none"/>
            ${dots}
            ${xLabels}
            <line id="ir-cross" x1="0" y1="${PAD_T}" x2="0" y2="${PAD_T+innerH}" stroke="#333" stroke-width="1" stroke-dasharray="3,2" opacity="0" style="pointer-events:none"/>
            <circle id="ir-hdot" cx="0" cy="0" r="3.5" fill="white" stroke="#333" stroke-width="1.5" opacity="0" style="pointer-events:none"/>
            <rect x="${PAD_L}" y="${PAD_T}" width="${innerW}" height="${innerH}" fill="transparent"/>
          </svg>
        </div>
        <div style="display:flex;justify-content:space-between;margin-top:4px;font-size:10px;color:var(--muted)">
          <span>BI target band: <strong style="color:var(--olive)">1.5%</strong> – <strong style="color:var(--red)">3.5%</strong></span>
          <span>
            <span style="display:inline-block;width:8px;height:8px;background:var(--olive);border-radius:2px;margin-right:3px;vertical-align:middle"></span>Within Target
            <span style="display:inline-block;width:8px;height:8px;background:var(--amber);border-radius:2px;margin:0 3px 0 8px;vertical-align:middle"></span>Above Target
            <span style="display:inline-block;width:8px;height:8px;background:var(--red);border-radius:2px;margin:0 3px 0 8px;vertical-align:middle"></span>High Inflation
          </span>
        </div>`
      : `<div style="color:var(--muted);font-size:12px;padding:12px 0">No historical data yet.</div>`;

    const statsHtml = `<div style="display:flex;gap:8px;margin-bottom:10px">

      </div>

        <div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted)">Lowest</div>

        <div style="font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--muted)">Latest</div>

      </div>
    </div>`;

    // Paginated table — 12 rows per page, latest first
    const totalPages = Math.ceil(history.length / PAGE_SIZE);
    const safePage   = Math.max(1, Math.min(page, totalPages));
    const pageSlice  = history.slice((safePage - 1) * PAGE_SIZE, safePage * PAGE_SIZE);

    const tableRows = pageSlice.map(h => {

        isLatest ? `<strong>${h.month}</strong>` : h.month,

    if (safePage === totalPages) {
      tableRows.push(['<span style="font-weight:700;color:var(--muted)">Average</span>', `<span class="fw">${avgRate}%</span>`, '']);

    const pagination = totalPages > 1 ? `

    return { statsHtml, svgChart, tableHtml: H.table(['Month','CPI Rate','BI Target Status'], tableRows) + pagination };
  }

  window.__irPeriod = '6mo';
  window.__irPage   = 1;

  window.setIRPeriod = (period) => {
    window.__irPeriod = period;
    window.__irPage = 1;
    const { statsHtml, svgChart, tableHtml } = renderIRPeriod(period, 1);

function vPeakSeason(d) {

  const pDate = s => { const [y,m,d2] = s.split('-').map(Number); return new Date(y, m-1, d2); };

    { name:'Idul Fitri (Lebaran)',   short:'Lebaran',          date:'2026-03-21', type:'holiday', icon:'🌙', uplift:'+160%' },
    { name:'Wafat Yesus Kristus',    short:'Good Friday',      date:'2026-04-03', type:'holiday', icon:'✝️',  uplift:'+20%'  },
    { name:'4.4 Sale',               short:'4.4',              date:'2026-04-04', type:'sale',    icon:'🛍', uplift:'+45%'  },
    { name:'Hari Buruh Nasional',    short:'Labor Day',        date:'2026-05-01', type:'holiday', icon:'⚒️',  uplift:'+20%'  },
    { name:'5.5 Sale',               short:'5.5',              date:'2026-05-05', type:'sale',    icon:'🛍', uplift:'+55%'  },
    { name:'Kenaikan Yesus Kristus', short:'Ascension Day',   date:'2026-05-14', type:'holiday', icon:'✝️',  uplift:'+15%'  },
    { name:'Idul Adha',              short:'Idul Adha',        date:'2026-05-27', type:'holiday', icon:'🐑', uplift:'+55%'  },
    { name:'Hari Waisak',            short:'Waisak',           date:'2026-05-31', type:'holiday', icon:'☸️',  uplift:'+10%'  },
    { name:'Hari Pancasila',         short:'Pancasila',        date:'2026-06-01', type:'holiday', icon:'🇮🇩', uplift:'+15%'  },
    { name:'6.6 Sale',               short:'6.6',              date:'2026-06-06', type:'sale',    icon:'🛍', uplift:'+60%'  },
    { name:'Tahun Baru Islam 1448H', short:'Tahun Baru Islam', date:'2026-06-16', type:'holiday', icon:'☪️', uplift:'+20%'  },
    { name:'7.7 Sale',               short:'7.7',              date:'2026-07-07', type:'sale',    icon:'🛍', uplift:'+85%'  },
    { name:'8.8 Sale',               short:'8.8',              date:'2026-08-08', type:'sale',    icon:'🛍', uplift:'+70%'  },
    { name:'Kemerdekaan RI ke-81',   short:'17 Agustus',       date:'2026-08-17', type:'holiday', icon:'🇮🇩', uplift:'+40%'  },
    { name:'Maulid Nabi SAW',        short:'Maulid Nabi',      date:'2026-08-25', type:'holiday', icon:'☪️',  uplift:'+20%'  },
    { name:'9.9 Sale',               short:'9.9',              date:'2026-09-09', type:'sale',    icon:'🛍', uplift:'+95%'  },
    { name:'10.10 Sale',             short:'10.10',            date:'2026-10-10', type:'sale',    icon:'🛍', uplift:'+115%' },
    { name:'11.11 Harbolnas',        short:'11.11',            date:'2026-11-11', type:'sale',    icon:'🛒', uplift:'+210%' },
    { name:'Black Friday',           short:'Black Friday',     date:'2026-11-27', type:'retail',  icon:'🖤', uplift:'+75%'  },
    { name:'Cyber Monday',           short:'Cyber Monday',     date:'2026-11-30', type:'retail',  icon:'💻', uplift:'+55%'  },
    { name:'12.12 Harbolnas',        short:'12.12',            date:'2026-12-12', type:'sale',    icon:'🛒', uplift:'+160%' },
    { name:'Hari Ibu',               short:'Hari Ibu',         date:'2026-12-22', type:'holiday', icon:'💝', uplift:'+30%'  },
    { name:'Cuti Bersama Natal',     short:'Cuti Natal',       date:'2026-12-24', type:'holiday', icon:'🎄', uplift:'+120%' },
    { name:'Hari Natal',             short:'Christmas',        date:'2026-12-25', type:'holiday', icon:'🎄', uplift:'+130%' },

  const raw = (d.events && d.events.length) ? d.events : FALLBACK_2026;
  const EVENTS = raw.map(e => ({ ...e, date: pDate(e.date) }));

  const sorted = [...EVENTS].sort((a,b) => a.date - b.date);
  const withMeta = sorted.map(e => {
    const days = diff(e.date);
    const urgency = days < 0 ? 'past' : days === 0 ? 'urgent' : days <= 14 ? 'urgent' : days <= 45 ? 'medium' : 'normal';
    return { ...e, days, urgency, dateStr: fmtD(e.date) };
  });

  const upcoming  = withMeta.filter(e => e.days >= 0);
  const next      = upcoming[0];
  const harbolnas = withMeta.find(e => e.short === '11.11');

  const tColor = { sale:'var(--olive)', holiday:'var(--amber)', retail:'#7B68EE' };

    retail:  `${next.name} is a major retail event with strong IDN e-commerce traction. Align promotions with platform campaigns early for estimated ${next.uplift} uplift.`,
  }[next.type];

  const cardEvents = upcoming.slice(0, 6);
  const cards = cardEvents.map(e => {
    const tc = tColor[e.type];
    return `<div class="cd-card ${e.urgency}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">
        <span style="font-size:9px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;color:${tc};background:${tc}18;padding:2px 7px;border-radius:20px">${tLabel[e.type]}</span>
        <span style="font-size:16px">${e.icon}</span>
      </div>
      <div class="cd-event">${e.name}</div>
      <div class="cd-date">${e.dateStr}</div>
      <div class="cd-num">${e.days}<span class="cd-unit"> day${e.days !== 1 ? 's' : ''}</span></div>
      <div class="cd-uplift">Est. uplift ${e.uplift}</div>
    </div>`;
  }).join('');

  // Build categorised calendar — past (newest first), soon (≤60d), later (>60d)
  const calPast  = withMeta.filter(e => e.days < 0).reverse();
  const calSoon  = withMeta.filter(e => e.days >= 0 && e.days <= 60);
  const calLater = withMeta.filter(e => e.days > 60);
  window._calEvents = { past: calPast, soon: calSoon, later: calLater };
  window._calPage   = 0;
  window._calTab    = calSoon.length ? 'soon' : calLater.length ? 'later' : 'past';

  const initTab   = window._calTab;
  const initEvts  = window._calEvents[initTab];
  const initTotal = Math.ceil(initEvts.length / 10);
  const initRows  = _calRows(initEvts.slice(0, 10));

  const calWidget = `
    <div class="cal-tabs">
      <button id="cal-tab-past"  class="cal-tab${initTab==='past' ?' active':''}" onclick="switchCalTab('past')">✓ Already Passed (${calPast.length})</button>
      <button id="cal-tab-soon"  class="cal-tab${initTab==='soon' ?' active':''}" onclick="switchCalTab('soon')">⚡ Upcoming Soon (${calSoon.length})</button>
      <button id="cal-tab-later" class="cal-tab${initTab==='later'?' active':''}" onclick="switchCalTab('later')">📅 Upcoming Later (${calLater.length})</button>

  return H.vh('Peak Season Alert', 'Indonesia 2026 — national holidays, double-date sales & retail events. Countdown refreshes daily based on your local date.', todayLabel, next ? `⚠ ${next.short} in ${next.days}d` : '✓ All Clear')

    + (histRows.length ? H.blk('Historical Sales Uplift Reference', H.table(['Event','Shopee','TikTok Shop','Combined'], histRows)) : '');
}

 * INTERACTIVE CALENDAR HELPERS (Peak Season Alert)
 * ════════════════════════════════════════════════════════════════ */
function _calRows(evts) {
  const tColor = { sale:'var(--olive)', holiday:'var(--amber)', retail:'#7B68EE' };
  const tLabel = { sale:'SALE', holiday:'LIBUR NASIONAL', retail:'RETAIL EVENT' };
  if (!evts || !evts.length) return `<tr><td colspan="5" style="color:var(--muted);text-align:center;padding:20px;font-size:12px">No events in this category</td></tr>`;
  return evts.map(e => {
    const past = e.days < 0;
    const dim  = 'color:var(--muted)';
    const tc   = past ? 'var(--muted)' : tColor[e.type];
    const daysCell = past
      ? `<span style="${dim};font-size:11px">✓ Passed</span>`
      : e.days === 0
        ? `<span class="st st-r" style="font-size:10px">TODAY</span>`
        : `<span style="font-weight:700;color:${e.urgency==='urgent'?'var(--red)':e.urgency==='medium'?'var(--amber)':'var(--text)'}">${e.days}d</span>`;
    return `<tr>
      <td><span style="${past ? dim : e.urgency==='urgent'?'font-weight:700':''}">${e.icon} ${e.name}</span></td>
      <td><span style="${past ? dim : ''}">${e.dateStr}</span></td>
      <td><span style="font-size:9px;font-weight:700;text-transform:uppercase;color:${tc}">${tLabel[e.type]}</span></td>
      <td>${daysCell}</td>
      <td><span style="${past ? dim : 'font-weight:600;color:var(--green)'}">${e.uplift}</span></td>
    </tr>`;
  }).join('');
}

function _calRefresh() {
  const tab   = window._calTab || 'soon';
  const evts  = ((window._calEvents || {})[tab]) || [];
  const page  = window._calPage || 0;
  const total = Math.ceil(evts.length / 10);
  const slice = evts.slice(page * 10, (page + 1) * 10);
  ['past','soon','later'].forEach(t => {
    const b = document.getElementById('cal-tab-' + t);
    if (b) b.className = 'cal-tab' + (t === tab ? ' active' : '');
  });
  const tbody = document.getElementById('cal-tbody');
  if (tbody) tbody.innerHTML = _calRows(slice);
  const info = document.getElementById('cal-pg-info');
  if (info) info.textContent = total > 1 ? `Page ${page + 1} / ${total}` : '';
  const prev = document.getElementById('cal-prev');
  const next = document.getElementById('cal-next');
  if (prev) prev.disabled = page <= 0;
  if (next) next.disabled = page >= total - 1;
}

function switchCalTab(tab) { window._calTab = tab; window._calPage = 0; _calRefresh(); }
function calPageNav(dir) {
  const evts = ((window._calEvents || {})[window._calTab]) || [];
  window._calPage = Math.max(0, Math.min((window._calPage || 0) + dir, Math.ceil(evts.length / 10) - 1));
  _calRefresh();
}

function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  const bd = document.getElementById('sb-backdrop');
  const hb = document.getElementById('hamburger');
  const isOpen = sb.classList.toggle('sb-open');
  bd.classList.toggle('visible', isOpen);
  hb.textContent = isOpen ? '✕' : '☰';
}
function closeSidebar() {
  document.getElementById('sidebar').classList.remove('sb-open');
  document.getElementById('sb-backdrop').classList.remove('visible');
  document.getElementById('hamburger').textContent = '☰';
}

function navigate(id) {
  if (!DATA[id]) return;
  activeId = id;
  if (window.innerWidth <= 820) closeSidebar();
  document.querySelectorAll('.sb-item').forEach(el =>
    el.classList.toggle('active', el.dataset.id === id)
  );
  const content = document.getElementById('content');
  try {
    content.innerHTML = VIEWS[id](DATA[id]);
  } catch (e) {
    console.error('Render error for', id, e);
    content.innerHTML = `<div style="padding:32px;color:var(--red);font-size:13px">Failed to render this section. Please hard-refresh (Ctrl+Shift+R) and try again.<br><small style="color:var(--muted)">${e.message}</small><br><small style="color:var(--muted);font-size:10px;white-space:pre-wrap">${(e.stack||'').slice(0,400)}</small></div>`;
    return;
  }
  if (typeof window.__postRender === 'function') {
    try { window.__postRender(); } catch(e) { console.warn('postRender error', e); }
    window.__postRender = null;
  }
  if (WIP_IDS.includes(id)) {
    content.querySelectorAll('.kpi, .blk-body').forEach(el => {
      el.classList.add('wip-el');
      const label = document.createElement('div');
      label.className = 'wip-label';
      label.textContent = 'On Progress';
      el.appendChild(label);
    });
  }
  content.scrollTop = 0;
}

/* ════════════════════════════════════════════════════════════════
 * SIDEBAR RENDER
 * ════════════════════════════════════════════════════════════════ */
function renderSidebar() {
  document.getElementById('sidebar').innerHTML = SIDEBAR.map(group => `
    <div class="sb-group" id="grp-${group.id}">
      <div class="sb-hd" onclick="toggleGroup('${group.id}')">
        <span class="sb-num">${group.num}</span>
        <span class="sb-name">${group.name}</span>
        <span class="sb-chev">▼</span>
      </div>
      <div class="sb-items">
        ${group.items.map(item => `
          <div class="sb-item" data-id="${item.id}" onclick="navigate('${item.id}')">
            ${item.label}
            ${item.alert ? '<span class="sb-dot"></span>' : ''}
          </div>`).join('')}
      </div>
    </div>`).join('');
}

function toggleGroup(id) {
  document.getElementById('grp-' + id).classList.toggle('closed');
}

/* ════════════════════════════════════════════════════════════════
 * INIT
 * ════════════════════════════════════════════════════════════════ */
async function init() {
  // Nav tabs
  document.getElementById('nav-tabs').innerHTML = NAV_TABS
    .map(t => `<li class="nav-tab${t.active ? ' active' : ''}">${t.label}</li>`)
    .join('');

  // Sidebar
  renderSidebar();

  // Load data
  DATA = await loadData();

  // Default to first view
  navigate('review-score');
}

/* ════════════════════════════════════════════════════════════════
 * AUTH
 * ════════════════════════════════════════════════════════════════ */
async function doLogin() {
  const email = document.getElementById('auth-email').value.trim();
  const pw    = document.getElementById('auth-pw').value;
  const btn   = document.getElementById('auth-btn');
  const err   = document.getElementById('auth-err');

  if (!email || !pw) {
    err.textContent = 'Please enter your email and password.';
    err.style.display = 'block'; return;
  }

  btn.textContent = 'Signing in…'; btn.disabled = true;
  err.style.display = 'none';

  const { error } = await _sb.auth.signInWithPassword({ email, password: pw });

  if (error) {
    err.textContent = 'Invalid email or password.';
    err.style.display = 'block';
    btn.textContent = 'Sign in'; btn.disabled = false;
    return;
  }

  document.getElementById('auth-overlay').style.display = 'none';
  document.getElementById('logout-btn').style.display = 'block';
  resetIdleTimer();
  if (!window._dashInited) { window._dashInited = true; await init(); }
}

async function doLogout() {
  await _sb.auth.signOut();
  document.getElementById('auth-overlay').style.display = 'flex';
  document.getElementById('logout-btn').style.display = 'none';
  document.getElementById('auth-email').value = '';
  document.getElementById('auth-pw').value = '';
  document.getElementById('auth-btn').textContent = 'Sign in';
  document.getElementById('auth-btn').disabled = false;
  document.getElementById('auth-err').style.display = 'none';
}

// 4-hour idle auto-logout
const IDLE_MS = 4 * 60 * 60 * 1000;
let _idleTimer = null;
function resetIdleTimer() {
  clearTimeout(_idleTimer);
  _idleTimer = setTimeout(doLogout, IDLE_MS);
}
['mousemove','mousedown','keydown','touchstart','scroll'].forEach(e =>
  document.addEventListener(e, resetIdleTimer, { passive: true })
);

// Auth disabled — open access
(async () => {
  window._dashInited = true;
  await init();
})();
</script>
